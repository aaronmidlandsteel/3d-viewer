<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">

    <title>Construction Site Viewer</title>

    <style>
        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>

<script type="module">

/* =====================================================
   IMPORTS
===================================================== */

import * as THREE from 'https://unpkg.com/three@0.165.0/build/three.module.js';


/* =====================================================
   SCENE
===================================================== */

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);


/* =====================================================
   CAMERA
===================================================== */

const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

// Human eye height
camera.position.set(0, 1.7, 30);


/* =====================================================
   RENDERER
===================================================== */

const renderer = new THREE.WebGLRenderer({
    antialias: true
});
renderer.setSize(
    window.innerWidth,
    window.innerHeight
);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.domElement.style.position = "fixed";
renderer.domElement.style.top = "0";
renderer.domElement.style.left = "0";
renderer.domElement.style.width = "100vw";
renderer.domElement.style.height = "100vh";

document.body.appendChild(renderer.domElement);

    /* =====================================================
   CLOCK
===================================================== */
const clock = new THREE.Clock();

/* =====================================================
   LIGHTING
===================================================== */

const ambient = new THREE.AmbientLight(
    0xffffff,
    0.7
);

scene.add(ambient);

const sun = new THREE.DirectionalLight(
    0xffffff,
    1
);

sun.position.set(20, 30, 20);

scene.add(sun);


/* =====================================================
   GROUND
===================================================== */

const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(200, 200),
    new THREE.MeshStandardMaterial({
        color: 0x707070
    })
);

ground.rotation.x = -Math.PI / 2;

scene.add(ground);

    /* =====================================================
   REBAR GRID
===================================================== */

const rebarMaterial = new THREE.MeshStandardMaterial({
    color: 0x444444,
    metalness: 0.9,
    roughness: 0.5
});

for (let i = -10; i <= 10; i += 1) {

    // Lines running X direction
    const bar1 = new THREE.Mesh(
        new THREE.BoxGeometry(20, 0.05, 0.05),
        rebarMaterial
    );

    bar1.position.set(0, 0.03, i);

    scene.add(bar1);

    // Lines running Z direction
    const bar2 = new THREE.Mesh(
        new THREE.BoxGeometry(0.05, 0.05, 20),
        rebarMaterial
    );

    bar2.position.set(i, 0.03, 0);

    scene.add(bar2);
}
``
/* =====================================================
   RETAINING WALL REBAR
===================================================== */

const wallRebarMaterial = new THREE.MeshStandardMaterial({
    color: 0x333333,
    metalness: 0.9,
    roughness: 0.4
});

// Vertical bars

for(let i = -10; i <= 10; i += 1){

    const bar = new THREE.Mesh(
        new THREE.CylinderGeometry(0.04, 0.04, 7)
        wallRebarMaterial
    );

    bar.position.set(i, 3.5, -20);

    scene.add(bar);
}

// Horizontal bars

for(let y = 0.5; y <= 5.5; y += 0.5){

    const bar = new THREE.Mesh(
        new THREE.CylinderGeometry(0.04, 0.04, 20),
        wallRebarMaterial
    );

    bar.rotation.z = Math.PI / 2;

    bar.position.set(0, y, -20);

    scene.add(bar);
}

    /* =====================================================
   CONCRETE FOOTING
===================================================== */

const footing = new THREE.Mesh(
    new THREE.BoxGeometry(24, 1, 3),
    new THREE.MeshStandardMaterial({
        color: 0xb0b0b0
    })
);

footing.position.set(0, 0.5, -20);

scene.add(footing);

/* =====================================================
   STEEL COLUMNS
===================================================== */

const steelMaterial = new THREE.MeshStandardMaterial({
    color: 0x777777,
    metalness: 0.8,
    roughness: 0.4
});

const columnPositions = [

    [-5, 5, -10],
    [ 5, 5, -10],

    [-5, 5,   0],
    [ 5, 5,   0],

    [-5, 5,  10],
    [ 5, 5,  10]

];

columnPositions.forEach(pos => {

    const column = new THREE.Mesh(
        new THREE.BoxGeometry(0.4, 10, 0.4),
        steelMaterial
    );

    column.position.set(
        pos[0],
        pos[1],
        pos[2]
    );

    scene.add(column);

});

/* =====================================================
   BEAMS
===================================================== */

const beamPositions = [-10, 0, 10];

beamPositions.forEach(z => {

    const beam = new THREE.Mesh(
        new THREE.BoxGeometry(10, 0.4, 0.4),
        steelMaterial
    );

    beam.position.set(0, 10, z);

    scene.add(beam);

});

/* =====================================================
   INPUT
===================================================== */

const keys = {};

window.addEventListener("keydown", (e) => {
    keys[e.key.toLowerCase()] = true;
});

window.addEventListener("keyup", (e) => {
    keys[e.key.toLowerCase()] = false;
});
/* =====================================================
   POINTER LOCK
===================================================== */

let mouseLocked = false;

document.addEventListener("click", () => {
    document.body.requestPointerLock();
});

document.addEventListener("pointerlockchange", () => {
    mouseLocked = document.pointerLockElement === document.body;
});

/* =====================================================
   MOUSE LOOK
===================================================== */
let yaw = 0;
let pitch = 0;

window.addEventListener("mousemove", (e) => {

    if (!mouseLocked) return;

    yaw -= e.movementX * 0.002;

    pitch -= e.movementY * 0.002;

    // Prevent neck-breaking
    pitch = Math.max(
        -Math.PI / 2.2,
        Math.min(Math.PI / 2.2, pitch)
    );

    camera.rotation.order = "YXZ";

    camera.rotation.y = yaw;
    camera.rotation.x = pitch;

});


/* =====================================================
   GAME LOOP
===================================================== */

function animate() {

    requestAnimationFrame(animate);

    const speed = 0.3;

  if (keys["w"]) {
    camera.position.x -= Math.sin(yaw) * speed;
    camera.position.z -= Math.cos(yaw) * speed;
}

if (keys["s"]) {
    camera.position.x += Math.sin(yaw) * speed;
    camera.position.z += Math.cos(yaw) * speed;
}

if (keys["a"]) {
    camera.position.x -= Math.cos(yaw) * speed;
    camera.position.z += Math.sin(yaw) * speed;
}

if (keys["d"]) {
    camera.position.x += Math.cos(yaw) * speed;
    camera.position.z -= Math.sin(yaw) * speed;
}
    renderer.render(scene, camera);
}

animate();

</script>

</body>
</html>
